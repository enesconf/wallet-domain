version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - exhaustive
    - godot

linters-settings:
  goimports:
    local-prefixes: github.com/charlestest/wallet-domain
  revive:
    rules:
      - name: exported
        severity: warning
      - name: error-return
        severity: warning
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
